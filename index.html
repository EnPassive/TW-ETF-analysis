<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnPassive｜台股 ETF 戰術決策儀表板</title>
  <style>
    :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #334155; --green: #16a34a; --red: #dc2626; --border: #e2e8f0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: var(--primary); margin-bottom: 8px; font-size: 28px; }
    .header span { color: var(--accent); }
    
    .market-banner { text-align:center; padding: 20px; background: #fff; border-radius: 12px 12px 0 0; border: 1px solid var(--border); border-bottom: none; }
    .market-banner h2 { margin: 0; font-size: 22px; color: var(--primary); }
    
    /* 新增：決策總結區樣式 */
    .summary-box { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 0 0 12px 12px; padding: 20px; margin-bottom: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .summary-title { font-weight: bold; color: #3730a3; margin-bottom: 10px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .summary-content { font-size: 15px; line-height: 1.8; color: #1e1b4b; }
    .buy-tag { background: var(--green); color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin: 0 4px; }
    .sell-tag { background: var(--red); color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin: 0 4px; }

    .section-title { font-size: 20px; color: var(--primary); margin: 40px 0 15px 0; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); position: relative; overflow: hidden; }
    .status-safe { border-top: 4px solid var(--green); }
    .status-warning { border-top: 4px solid var(--red); }
    .status-neutral { border-top: 4px solid #eab308; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .symbol { font-size: 20px; font-weight: bold; color: var(--primary); }
    .price { font-size: 24px; font-weight: bold; color: var(--accent); }
    .advice { font-size: 15px; font-weight: bold; margin-bottom: 15px; padding: 10px; border-radius: 6px; }
    .advice.safe { color: #166534; background: #dcfce7; }
    .advice.warning { color: #991b1b; background: #fee2e2; }
    .advice.neutral { color: #854d0e; background: #fef9c3; }
    .stats { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 15px; flex-wrap: wrap; gap: 5px;}
    .stats span { background: #f1f5f9; padding: 4px 8px; border-radius: 4px; flex: 1 1 45%; text-align: center;}
    .action-section { display: flex; gap: 10px; margin-top: 10px; }
    .action-box { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #f8fafc; }
    .action-title { font-size: 11px; color: #64748b; font-weight: bold; margin-bottom: 5px; }
    .action-vals { font-size: 14px; font-weight: bold; }
    .buy-color { color: var(--green); }
    .sell-color { color: var(--red); }
    .update-time { text-align: center; margin-top: 40px; font-size: 12px; color: #94a3b8; }
    .loading { text-align: center; padding: 50px; font-size: 18px; color: #64748b; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>EnPassive <span>戰術決策儀表板</span></h1><p>每日自動化盤後分析，嚴守紀律的資產配置系統</p></div>
  
  <div class="market-banner"><h2>🏛️ 台股總體情勢：<span id="marketStatus">讀取中...</span></h2></div>
  
  <div class="summary-box">
    <div class="summary-title">💡 今日執行建議 (人話版)</div>
    <div id="decisionSummary" class="summary-content">分析數據中，請稍候...</div>
  </div>

  <h2 class="section-title">💰 收益核心 (高股息 ETF)</h2><div id="grid-dividend" class="grid-layout"><div class="loading">讀取中...</div></div>
  <h2 class="section-title">📈 成長核心 (市值型 ETF)</h2><div id="grid-market" class="grid-layout"><div class="loading">讀取中...</div></div>
  <h2 class="section-title">🚀 衛星配置 (主動/策略型 ETF)</h2><div id="grid-strategy" class="grid-layout"><div class="loading">讀取中...</div></div>
  <div class="update-time" id="lastUpdate"></div>
</div>
<script>
  function createCardHTML(symbol, info) {
    const buyPrices = info.buy_grids.length > 0 ? info.buy_grids.join(' / ') : '--';
    const sellPrices = info.sell_grids.length > 0 ? info.sell_grids.join(' / ') : '--';
    return `
      <div class="card status-${info.status_type}">
        <div class="card-header"><div class="symbol">${symbol}</div><div class="price">${info.price}</div></div>
        <div class="advice ${info.status_type}">${info.advice}</div>
        <div class="stats">
          <span>RSI: <b>${info.rsi}</b></span><span>月線: <b>${info.ma20}</b></span>
          <span>近四季配息: <b>${info.trailing_div > 0 ? info.trailing_div + '元' : '--'}</b></span>
          <span>真實殖利率: <b>${info.yield_rate !== "-" ? info.yield_rate + '%' : '--'}</b></span>
        </div>
        <div class="action-section">
          <div class="action-box"><div class="action-title">🛒 網格買進建議</div><div class="action-vals buy-color">${buyPrices}</div></div>
          <div class="action-box"><div class="action-title">🎯 網格賣出建議</div><div class="action-vals sell-color">${sellPrices}</div></div>
        </div>
      </div>
    `;
  }

  async function loadData() {
    try {
      const res = await fetch('data.json?t=' + Date.now());
      const data = await res.json();
      
      const grids = { dividend: document.getElementById('grid-dividend'), market: document.getElementById('grid-market'), strategy: document.getElementById('grid-strategy') };
      Object.values(grids).forEach(el => el.innerHTML = '');
      
      let buyTargets = [], sellTargets = [], lastUpdate = '';
      const first = Object.keys(data)[0];
      if(first) document.getElementById('marketStatus').innerHTML = data[first].market_regime;

      for (const [symbol, info] of Object.entries(data)) {
        lastUpdate = info.updated_at;
        if (info.status_type === 'safe') buyTargets.push(symbol);
        if (info.status_type === 'warning') sellTargets.push(symbol);
        
        const html = createCardHTML(symbol, info);
        if (grids[info.category]) grids[info.category].innerHTML += html;
      }

      // 更新總結文字
      let summaryText = "";
      if (buyTargets.length > 0) {
          summaryText += `🟢 <b>今日可優先佈局標的：</b> <span class="buy-tag">${buyTargets.join('</span> <span class="buy-tag">')}</span>。目前這些標的已進入低接區間，請參考下方網格價下單。<br>`;
      }
      if (sellTargets.length > 0) {
          summaryText += `🔴 <b>建議考慮減碼標的：</b> <span class="sell-tag">${sellTargets.join('</span> <span class="sell-tag">')}</span>。部分標的已出現過熱或大盤轉弱訊號，建議入袋為安。<br>`;
      }
      if (buyTargets.length === 0 && sellTargets.length === 0) {
          summaryText = "🟡 <b>目前市場無明顯佈局信號：</b> 所有標的均在合理區間震盪，建議維持既有持股，耐心等待更佳的回測機會。";
      }
      document.getElementById('decisionSummary').innerHTML = summaryText;

      document.getElementById('lastUpdate').innerText = `最後分析更新時間：${lastUpdate} (盤後自動執行)`;
    } catch (e) {
      document.getElementById('decisionSummary').innerHTML = "⚠️ 無法載入分析數據。";
    }
  }
  loadData();
</script>
</body>
</html>

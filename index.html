<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnPassive｜台股 ETF 戰術決策儀表板</title>
  <style>
    :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #334155; --green: #16a34a; --red: #dc2626; --border: #e2e8f0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { color: var(--primary); margin-bottom: 8px; font-size: 28px; }
    .header span { color: var(--accent); }
    
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); position: relative; overflow: hidden; }
    
    .status-safe { border-top: 4px solid var(--green); }
    .status-warning { border-top: 4px solid var(--red); }
    .status-neutral { border-top: 4px solid #eab308; }
    
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .symbol { font-size: 20px; font-weight: bold; color: var(--primary); }
    .price { font-size: 24px; font-weight: bold; color: var(--accent); }
    
    .advice { font-size: 15px; font-weight: bold; margin-bottom: 15px; padding: 10px; background: #f1f5f9; border-radius: 6px; }
    .advice.safe { color: #166534; background: #dcfce7; }
    .advice.warning { color: #991b1b; background: #fee2e2; }
    .advice.neutral { color: #854d0e; background: #fef9c3; }

    .stats { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; margin-bottom: 15px; }
    
    .action-section { display: flex; gap: 10px; margin-top: 10px; }
    .action-box { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #f8fafc; }
    .action-title { font-size: 12px; color: #64748b; font-weight: bold; margin-bottom: 5px; }
    .action-vals { font-size: 15px; font-weight: bold; letter-spacing: 0.5px; }
    .buy-color { color: var(--green); }
    .sell-color { color: var(--red); }
    
    .update-time { text-align: center; margin-top: 30px; font-size: 13px; color: #94a3b8; }
    .loading { text-align: center; padding: 50px; font-size: 18px; color: #64748b; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>EnPassive <span>戰術決策儀表板</span></h1>
    <p>每日自動化盤後分析，結合「殖利率估值」與「均線動能」之網格決策系統</p>
  </div>

  <div id="dashboard" class="grid-layout">
    <div class="loading">🔄 讀取最新決策數據中...</div>
  </div>
  
  <div class="update-time" id="lastUpdate"></div>
</div>

<script>
  async function loadData() {
    try {
      // 加上時間戳防止瀏覽器快取舊資料
      const res = await fetch('data.json?t=' + Date.now());
      if (!res.ok) throw new Error('找不到 data.json，請確認 GitHub Actions 是否已成功執行。');
      
      const data = await res.json();
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '';
      
      let lastUpdateTime = '';

      for (const [symbol, info] of Object.entries(data)) {
        lastUpdateTime = info.updated_at;
        const buyPrices = info.buy_grids.map(p => p.toFixed(2)).join(' / ');
        const sellPrices = info.sell_grids.map(p => p.toFixed(2)).join(' / ');
        
        const cardHTML = `
          <div class="card status-${info.status_type}">
            <div class="card-header">
              <div class="symbol">${symbol}</div>
              <div class="price">${info.price.toFixed(2)}</div>
            </div>
            
            <div class="advice ${info.status_type}">
              ${info.advice}
            </div>
            
            <div class="stats">
              <span>RSI(14): <b>${info.rsi}</b></span>
              <span>月線(20MA): <b>${info.ma20}</b></span>
              <span>波段高點: <b>${info.high}</b></span>
            </div>
            
            <div class="action-section">
              <div class="action-box">
                <div class="action-title">🛒 網格買進建議</div>
                <div class="action-vals buy-color">${buyPrices}</div>
              </div>
              <div class="action-box">
                <div class="action-title">🎯 網格賣出建議</div>
                <div class="action-vals sell-color">${sellPrices}</div>
              </div>
            </div>
          </div>
        `;
        dashboard.innerHTML += cardHTML;
      }
      
      document.getElementById('lastUpdate').innerText = `最後分析更新時間：${lastUpdateTime} (盤後自動執行)`;
      
    } catch (error) {
      document.getElementById('dashboard').innerHTML = `
        <div style="grid-column: 1 / -1; text-align:center; padding: 30px; background: #fee2e2; border-radius:8px; color:#991b1b;">
          ⚠️ 尚未生成數據檔案。<br>請至 GitHub 儲存庫的 <b>Actions</b> 標籤頁，手動點擊 <b>Run workflow</b> 執行第一次分析。
        </div>
      `;
      console.error(error);
    }
  }

  loadData();
</script>
</body>
</html>
